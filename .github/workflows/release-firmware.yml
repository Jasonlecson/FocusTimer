name: Release Firmware

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: esp32h2
          path: '.'
          command: idf.py build

      - name: Install esptool
        run: pip install esptool

      - name: Package firmware artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '\r\n' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi

          flash_mode="$(python - <<'PY'
          import json
          with open('build/flasher_args.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(data['flash_settings']['flash_mode'])
          PY
                    )"
                    flash_freq="$(python - <<'PY'
          import json
          with open('build/flasher_args.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(data['flash_settings']['flash_freq'])
          PY
                    )"
                    flash_size="$(python - <<'PY'
          import json
          with open('build/flasher_args.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(data['flash_settings']['flash_size'])
          PY
                    )"

          artifact_dir="release-artifacts"
          app_firmware="focustimer_${version}.bin"
          full_firmware="focustimer_full_${version}.bin"

          mkdir -p "$artifact_dir"
          cp build/focustimer.bin "$artifact_dir/$app_firmware"

          esptool.py \
            --chip esp32h2 merge_bin \
            --output "$artifact_dir/$full_firmware" \
            --format raw \
            --flash_mode "$flash_mode" \
            --flash_freq "$flash_freq" \
            --flash_size "$flash_size" \
            --fill-flash-size "$flash_size" \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/focustimer.bin \
            0x310000 assets/timeout.bin

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"
        id: package


      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: v${{ steps.package.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.artifact_dir }}/focustimer_${{ steps.package.outputs.version }}.bin
            ${{ steps.package.outputs.artifact_dir }}/focustimer_full_${{ steps.package.outputs.version }}.bin