<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 批量转 WAV 本地工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-1: #ffe6cf;
            --bg-2: #d4f2ef;
            --card: rgba(255, 255, 255, 0.88);
            --text: #1e2424;
            --muted: #5e6a69;
            --line: rgba(11, 70, 72, 0.18);
            --primary: #0f766e;
            --primary-2: #0b5f71;
            --accent: #ef7c3d;
            --ok: #138f5b;
            --warn: #9b3f12;
            --shadow: 0 20px 40px rgba(16, 38, 36, 0.16);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 28px 16px;
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 15%, rgba(239, 124, 61, 0.26) 0, transparent 46%),
                radial-gradient(circle at 88% 16%, rgba(15, 118, 110, 0.3) 0, transparent 42%),
                radial-gradient(circle at 85% 78%, rgba(22, 72, 122, 0.16) 0, transparent 38%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            animation: bgFloat 12s ease-in-out infinite alternate;
        }

        .shell {
            width: min(980px, 100%);
            margin: 0 auto;
            border-radius: 26px;
            backdrop-filter: blur(6px);
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .hero {
            margin-bottom: 22px;
        }

        h1 {
            font-size: clamp(1.85rem, 4vw, 2.7rem);
            line-height: 1.08;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        .hero p {
            color: var(--muted);
            font-size: 1.03rem;
        }

        .drop-zone {
            border: 2px dashed var(--line);
            border-radius: 22px;
            padding: 34px 18px;
            text-align: center;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.6), rgba(228, 247, 245, 0.72));
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
        }

        .drop-zone:hover {
            transform: translateY(-1px);
            border-color: rgba(11, 95, 113, 0.45);
            box-shadow: 0 10px 22px rgba(11, 95, 113, 0.12);
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            box-shadow: 0 12px 24px rgba(239, 124, 61, 0.2);
            transform: scale(1.01);
        }

        .drop-icon {
            font-size: 2.25rem;
            margin-bottom: 10px;
        }

        .drop-title {
            font-size: 1.12rem;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .drop-sub {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .file-input {
            display: none;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .controls {
            margin-top: 14px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 10px;
        }

        .control-card {
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid rgba(9, 69, 67, 0.14);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .control-card label {
            display: block;
            font-size: 0.84rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .control-card select {
            width: 100%;
            border: 1px solid rgba(11, 70, 72, 0.2);
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 10px;
            color: #113130;
            font-family: inherit;
            font-weight: 600;
        }

        button,
        .button-link {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        button:hover,
        .button-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 43, 40, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(120deg, var(--primary), var(--primary-2));
        }

        .btn-accent {
            color: #fff;
            background: linear-gradient(120deg, #f38a4f, #cf5a26);
        }

        .btn-ghost {
            color: #183a38;
            background: rgba(16, 96, 93, 0.12);
        }

        .status {
            margin: 16px 0 10px;
            color: var(--muted);
            font-size: 0.94rem;
        }

        .progress-wrap {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: rgba(8, 46, 44, 0.12);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--accent), #f4b56c, #1a8a82);
            transition: width 0.25s ease;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            gap: 10px;
            flex-wrap: wrap;
        }

        .result-title {
            font-size: 1.02rem;
            font-weight: 700;
        }

        .result-list {
            list-style: none;
            display: grid;
            gap: 10px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(9, 69, 67, 0.12);
            border-radius: 14px;
            padding: 10px 12px;
        }

        .meta {
            min-width: 0;
        }

        .name {
            font-weight: 700;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .desc {
            font-size: 0.86rem;
            color: var(--muted);
        }

        .flag-ok {
            color: var(--ok);
            font-weight: 700;
        }

        .flag-warn {
            color: var(--warn);
            font-weight: 700;
        }

        .tips strong {
            display: block;
            margin-bottom: 6px;
            color: #173634;
        }

        @keyframes bgFloat {
            from {
                background-position: 0 0, 0 0, 0 0, 0 0;
            }

            to {
                background-position: 24px -16px, -18px 12px, 20px 15px, 0 0;
            }
        }

        @media (max-width: 720px) {
            .shell {
                padding: 18px;
                border-radius: 20px;
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <main class="shell">
        <section class="hero">
            <h1>MP3 批量转 WAV</h1>
        </section>

        <section class="drop-zone" id="dropZone" aria-label="上传音频">
            <div class="drop-icon">🎧</div>
            <div class="drop-title">拖拽 MP3 到这里，或点击选择文件</div>
            <div class="drop-sub">支持多选，转换过程完全在浏览器内完成</div>
            <input type="file" id="fileInput" class="file-input" accept=".mp3,audio/mpeg" multiple>
        </section>

        <section class="actions">
            <button id="pickBtn" class="btn-primary" type="button">选择 MP3 文件</button>
            <button id="convertBtn" class="btn-accent" type="button" disabled>开始批量转换</button>
            <button id="clearBtn" class="btn-ghost" type="button">清空列表</button>
            <button id="downloadZipBtn" class="btn-primary" type="button" disabled>下载全部 ZIP</button>
        </section>

        <section class="controls">
            <div class="control-card">
                <label for="sampleRateSelect">输出采样率</label>
                <select id="sampleRateSelect">
                    <option value="keep">保持原采样率</option>
                    <option value="22050" selected>22050 Hz</option>
                    <option value="32000">32000 Hz</option>
                    <option value="44100">44100 Hz</option>
                    <option value="48000">48000 Hz</option>
                </select>
            </div>
            <div class="control-card">
                <label for="bitDepthSelect">输出采样位数</label>
                <select id="bitDepthSelect">
                    <option value="16" selected>16-bit PCM</option>
                    <option value="24">24-bit PCM</option>
                    <option value="32">32-bit PCM</option>
                </select>
            </div>
            <div class="control-card">
                <label for="channelSelect">输出声道</label>
                <select id="channelSelect">
                    <option value="1" selected>单声道 (Mono)</option>
                    <option value="2">双声道 (Stereo)</option>
                </select>
            </div>
        </section>

        <div id="status" class="status">等待选择文件...</div>
        <div class="progress-wrap" aria-hidden="true">
            <div id="progress" class="progress"></div>
        </div>

        <section>
            <div class="result-header">
                <div class="result-title">转换列表</div>
            </div>
            <ul id="resultList" class="result-list"></ul>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const pickBtn = document.getElementById('pickBtn');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const sampleRateSelect = document.getElementById('sampleRateSelect');
        const bitDepthSelect = document.getElementById('bitDepthSelect');
        const channelSelect = document.getElementById('channelSelect');
        const statusEl = document.getElementById('status');
        const progressEl = document.getElementById('progress');
        const resultList = document.getElementById('resultList');

        const selectedFiles = [];
        const convertedFiles = [];
        let isConverting = false;

        pickBtn.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (event) => {
            addFiles(event.target.files);
            fileInput.value = '';
        });

        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(event.dataTransfer.files);
        });

        clearBtn.addEventListener('click', () => {
            if (isConverting) {
                return;
            }
            selectedFiles.length = 0;
            clearConvertedUrls();
            renderList();
            updateActionState();
            statusEl.textContent = '已清空，等待选择文件...';
            setProgress(0);
        });

        convertBtn.addEventListener('click', async () => {
            if (isConverting || selectedFiles.length === 0) {
                return;
            }

            isConverting = true;
            clearConvertedUrls();
            setProgress(0);
            updateActionState();

            const mp3List = selectedFiles.filter((item) => item.file.name.toLowerCase().endsWith('.mp3') || item.file.type.includes('mpeg'));
            const total = mp3List.length;
            let done = 0;
            const options = getConversionOptions();

            for (const item of selectedFiles) {
                item.state = 'waiting';
                item.message = '等待转换';
                item.output = null;
            }
            renderList();

            if (total === 0) {
                statusEl.textContent = '没有可转换的 MP3 文件';
                isConverting = false;
                updateActionState();
                return;
            }

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            for (const item of selectedFiles) {
                if (!(item.file.name.toLowerCase().endsWith('.mp3') || item.file.type.includes('mpeg'))) {
                    item.state = 'error';
                    item.message = '已跳过：不是 MP3 文件';
                    renderList();
                    continue;
                }

                item.state = 'converting';
                item.message = '解码中...';
                renderList();

                statusEl.textContent = '正在转换: ' + item.file.name;

                try {
                    const wavBlob = await convertMp3ToWavBlob(item.file, audioContext, options);
                    const wavName = toWavName(item.file.name);
                    const url = URL.createObjectURL(wavBlob);

                    item.state = 'done';
                    item.message = '转换完成';
                    item.output = {
                        name: wavName,
                        blob: wavBlob,
                        url: url,
                        size: wavBlob.size
                    };

                    convertedFiles.push(item.output);
                } catch (error) {
                    item.state = 'error';
                    item.message = '转换失败: ' + (error && error.message ? error.message : '无法解码该文件');
                }

                done += 1;
                setProgress((done / total) * 100);
                renderList();
            }

            await audioContext.close();

            const successCount = selectedFiles.filter((item) => item.state === 'done').length;
            const failCount = selectedFiles.filter((item) => item.state === 'error').length;
            statusEl.textContent = '转换结束: 成功 ' + successCount + '，失败 ' + failCount;

            isConverting = false;
            updateActionState();
        });

        downloadZipBtn.addEventListener('click', async () => {
            if (convertedFiles.length === 0 || isConverting) {
                return;
            }

            if (typeof window.JSZip === 'undefined') {
                statusEl.textContent = 'ZIP 组件加载失败，请检查网络后重试';
                return;
            }

            downloadZipBtn.disabled = true;
            statusEl.textContent = '正在打包 ZIP...';

            try {
                const zip = new window.JSZip();
                for (const out of convertedFiles) {
                    zip.file(out.name, out.blob);
                }

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const zipUrl = URL.createObjectURL(zipBlob);
                const stamp = new Date().toISOString().replace(/[:.]/g, '-');

                triggerDownload(zipUrl, 'wav-batch-' + stamp + '.zip');

                setTimeout(() => URL.revokeObjectURL(zipUrl), 2000);
                statusEl.textContent = 'ZIP 下载已开始';
            } catch (error) {
                statusEl.textContent = 'ZIP 打包失败: ' + (error && error.message ? error.message : '未知错误');
            }

            updateActionState();
        });

        function addFiles(fileList) {
            if (!fileList || fileList.length === 0) {
                return;
            }

            const existingKey = new Set(selectedFiles.map((item) => item.file.name + '_' + item.file.size));
            let addedCount = 0;
            let rejectedCount = 0;

            for (const file of Array.from(fileList)) {
                if (!isMp3File(file)) {
                    rejectedCount += 1;
                    continue;
                }

                const key = file.name + '_' + file.size;
                if (!existingKey.has(key)) {
                    selectedFiles.push({
                        file: file,
                        state: 'idle',
                        message: '等待开始',
                        output: null
                    });
                    existingKey.add(key);
                    addedCount += 1;
                }
            }

            renderList();
            updateActionState();

            if (addedCount > 0 && rejectedCount > 0) {
                statusEl.textContent = '已添加 ' + addedCount + ' 个 MP3，已拦截 ' + rejectedCount + ' 个非 MP3 文件';
                return;
            }

            if (addedCount > 0) {
                statusEl.textContent = '已选择 ' + selectedFiles.length + ' 个 MP3 文件';
                return;
            }

            if (rejectedCount > 0) {
                statusEl.textContent = '未添加文件：仅支持 MP3 格式';
            }
        }

        function renderList() {
            resultList.innerHTML = '';

            if (selectedFiles.length === 0) {
                const empty = document.createElement('li');
                empty.className = 'result-item';
                empty.innerHTML = '<div class="meta"><div class="name">暂无文件</div><div class="desc">添加 MP3 后会显示在这里</div></div>';
                resultList.appendChild(empty);
                return;
            }

            for (const item of selectedFiles) {
                const li = document.createElement('li');
                li.className = 'result-item';

                const right = document.createElement('div');

                if (item.state === 'done' && item.output) {
                    const link = document.createElement('a');
                    link.className = 'button-link btn-primary';
                    link.href = item.output.url;
                    link.download = item.output.name;
                    link.textContent = '下载 WAV';
                    right.appendChild(link);
                } else {
                    const flag = document.createElement('span');
                    flag.className = item.state === 'error' ? 'flag-warn' : 'flag-ok';
                    flag.textContent = stateText(item.state);
                    right.appendChild(flag);
                }

                li.innerHTML =
                    '<div class="meta">' +
                    '<div class="name">' + escapeHtml(item.file.name) + '</div>' +
                    '<div class="desc">' + escapeHtml(item.message) + ' · ' + formatBytes(item.file.size) + '</div>' +
                    '</div>';

                li.appendChild(right);
                resultList.appendChild(li);
            }
        }

        async function convertMp3ToWavBlob(file, audioContext, options) {
            const arrayBuffer = await file.arrayBuffer();
            const decoded = await audioContext.decodeAudioData(arrayBuffer.slice(0));

            let finalAudio = decoded;

            // 声道转换
            if (options.channels !== decoded.numberOfChannels) {
                finalAudio = await convertChannels(finalAudio, options.channels);
            }

            // 采样率转换
            if (options.sampleRate !== null && finalAudio.sampleRate !== options.sampleRate) {
                finalAudio = await resampleAudioBuffer(finalAudio, options.sampleRate);
            }

            const wavBuffer = encodeWav(finalAudio, options.bitDepth);
            return new Blob([wavBuffer], { type: 'audio/wav' });
        }

        async function convertChannels(audioBuffer, targetChannels) {
            const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
            if (!OfflineCtx) {
                throw new Error('当前浏览器不支持声道转换');
            }

            const frameCount = audioBuffer.length;
            const sampleRate = audioBuffer.sampleRate;
            const offline = new OfflineCtx(targetChannels, frameCount, sampleRate);
            const source = offline.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offline.destination);
            source.start(0);
            return await offline.startRendering();
        }

        async function resampleAudioBuffer(audioBuffer, targetSampleRate) {
            if (audioBuffer.sampleRate === targetSampleRate) {
                return audioBuffer;
            }

            const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
            if (!OfflineCtx) {
                throw new Error('当前浏览器不支持重采样');
            }

            const frameCount = Math.ceil(audioBuffer.duration * targetSampleRate);
            const offline = new OfflineCtx(audioBuffer.numberOfChannels, frameCount, targetSampleRate);
            const source = offline.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offline.destination);
            source.start(0);
            return await offline.startRendering();
        }

        function encodeWav(audioBuffer, bitDepth) {
            const channels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const length = audioBuffer.length;
            const bytesPerSample = bitDepth / 8;
            const blockAlign = channels * bytesPerSample;
            const dataSize = length * blockAlign;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, channels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            const channelData = [];
            for (let channel = 0; channel < channels; channel++) {
                channelData.push(audioBuffer.getChannelData(channel));
            }

            let offset = 44;
            for (let i = 0; i < length; i++) {
                for (let ch = 0; ch < channels; ch++) {
                    const sample = Math.max(-1, Math.min(1, channelData[ch][i]));

                    if (bitDepth === 16) {
                        const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
                        view.setInt16(offset, int16, true);
                        offset += 2;
                        continue;
                    }

                    if (bitDepth === 24) {
                        const int24 = Math.max(-8388608, Math.min(8388607, Math.round(sample * 8388607)));
                        const val = int24 < 0 ? int24 + 16777216 : int24;
                        view.setUint8(offset, val & 0xff);
                        view.setUint8(offset + 1, (val >> 8) & 0xff);
                        view.setUint8(offset + 2, (val >> 16) & 0xff);
                        offset += 3;
                        continue;
                    }

                    const int32 = sample < 0
                        ? Math.max(-2147483648, Math.round(sample * 2147483648))
                        : Math.min(2147483647, Math.round(sample * 2147483647));
                    view.setInt32(offset, int32, true);
                    offset += 4;
                }
            }

            return buffer;
        }

        function getConversionOptions() {
            const sampleRateValue = sampleRateSelect.value;
            const bitDepthValue = parseInt(bitDepthSelect.value, 10);
            const channelValue = parseInt(channelSelect.value, 10);

            return {
                sampleRate: sampleRateValue === 'keep' ? null : parseInt(sampleRateValue, 10),
                bitDepth: Number.isNaN(bitDepthValue) ? 16 : bitDepthValue,
                channels: Number.isNaN(channelValue) ? 1 : channelValue
            };
        }

        function isMp3File(file) {
            return file.name.toLowerCase().endsWith('.mp3') || file.type.includes('mpeg');
        }

        function writeString(view, offset, text) {
            for (let i = 0; i < text.length; i++) {
                view.setUint8(offset + i, text.charCodeAt(i));
            }
        }

        function updateActionState() {
            convertBtn.disabled = isConverting || selectedFiles.length === 0;
            clearBtn.disabled = isConverting;
            pickBtn.disabled = isConverting;
            downloadZipBtn.disabled = isConverting || convertedFiles.length === 0;
        }

        function setProgress(value) {
            progressEl.style.width = Math.max(0, Math.min(100, value)).toFixed(1) + '%';
        }

        function toWavName(name) {
            return name.replace(/\.[^/.]+$/, '') + '.wav';
        }

        function formatBytes(bytes) {
            if (bytes < 1024) {
                return bytes + ' B';
            }
            if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(1) + ' KB';
            }
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function stateText(state) {
            if (state === 'converting') {
                return '转换中';
            }
            if (state === 'error') {
                return '失败';
            }
            if (state === 'waiting') {
                return '排队';
            }
            if (state === 'idle') {
                return '待转换';
            }
            return '完成';
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function clearConvertedUrls() {
            for (const out of convertedFiles) {
                URL.revokeObjectURL(out.url);
            }
            convertedFiles.length = 0;
        }

        function triggerDownload(url, fileName) {
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        renderList();
        updateActionState();
    </script>
</body>

</html>
